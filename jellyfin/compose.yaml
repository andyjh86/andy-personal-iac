# ================================================================
# SETUP INSTRUCTIONS:
# 1. Create folders: sudo mkdir -p /opt/jellyfin/config /opt/jellyfin/cache
# 2. Set permissions: sudo chown -R 1000:1000 /opt/jellyfin
# 3. Media path: Confirm /mnt/media/media server exists
# ================================================================


services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:1000
    network_mode: 'host'
	#### Using 'host' mode allows DLNA/UPNP discovery so smart TVs can find the server automatically.
	#### Note: In 'host' mode, the container shares the host's IP; the 'ports' section below is redundant.
    #ports:
     # - "8096:8096"
	 #### Port 8096 is open by default on the host IP because of 'network_mode: host'. (Leave these with the #)
    volumes:
      - /opt/jellyfin/config:/config
      - /opt/jellyfin/cache:/cache
      - '/mnt/media/media server:/media' ################ need to confirm storage location first
    restart: 'unless-stopped'
    environment:
      - JELLYFIN_PublishedServerUrl=http://10.0.0.250 ########## change the IP address the same as the machine
    extra_hosts:
      - "host.docker.internal:host-gateway"
